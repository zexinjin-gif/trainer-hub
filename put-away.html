<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How To Put Things Away | Trainer Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="back-link" href="operations.html">&larr; Back</a>
    <h1>Put Things Away</h1>
  </header>

  <main class="content content-wide">
    <input type="search" id="photo-search" class="search-bar" placeholder="Search e.g. dumbbell, mat, iPad" autocomplete="off">
    <p class="intro">Tap any photo to enlarge.</p>

    <p id="no-results" class="no-results" hidden>No photos match.</p>

    <div class="photo-grid">
      <a class="photo-item" href="images/put-away/olympic-bar-1.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/olympic-bar-1.jpg" alt="Olympic bar" loading="lazy">
        <span class="caption">Olympic bar</span>
      </a>

      <a class="photo-item" href="images/put-away/olympic-bar-2.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/olympic-bar-2.jpg" alt="Olympic bar close up" loading="lazy">
        <span class="caption">Olympic bar (close up)</span>
      </a>

      <a class="photo-item" href="images/put-away/where-olympic-bar-goes.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/where-olympic-bar-goes.jpg" alt="Where the Olympic bar goes" loading="lazy">
        <span class="caption">Where the Olympic bar goes</span>
      </a>

      <a class="photo-item" href="images/put-away/heavy-dumbbells-and-sled.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/heavy-dumbbells-and-sled.jpg" alt="Heavy dumbbells and sled" loading="lazy">
        <span class="caption">Heavy dumbbells &amp; sled</span>
      </a>

      <a class="photo-item" href="images/put-away/heavy-dumbbells-and-sled-2.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/heavy-dumbbells-and-sled-2.jpg" alt="Heavy dumbbells and sled, view 2" loading="lazy">
        <span class="caption">Heavy dumbbells &amp; sled (view 2)</span>
      </a>

      <a class="photo-item" href="images/put-away/leave-gap-here.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/leave-gap-here.jpg" alt="Leave a gap here" loading="lazy">
        <span class="caption">Leave a gap here</span>
      </a>

      <a class="photo-item" href="images/put-away/fold-mat-like-this.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/fold-mat-like-this.jpg" alt="Fold the mat like this" loading="lazy">
        <span class="caption">Fold mats like this</span>
      </a>

      <a class="photo-item" href="images/put-away/ipad-on-charge.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/ipad-on-charge.jpg" alt="iPad on charge" loading="lazy">
        <span class="caption">iPad on charge</span>
      </a>

      <a class="photo-item" href="images/put-away/ipad-in-charge-mode.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/ipad-in-charge-mode.jpg" alt="iPad in charge mode" loading="lazy">
        <span class="caption">iPad in charge mode</span>
      </a>

      <a class="photo-item" href="images/put-away/yell.jpg" target="_blank" rel="noopener">
        <img src="images/put-away/yell.jpg" alt="Yell" loading="lazy">
        <span class="caption">Yell</span>
      </a>
    </div>
  </main>

  <script>
    const search = document.getElementById('photo-search');
    const items = document.querySelectorAll('.photo-item');
    const noResults = document.getElementById('no-results');

    search.addEventListener('input', () => {
      const q = search.value.trim().toLowerCase();
      let visible = 0;
      items.forEach(item => {
        const caption = item.querySelector('.caption').textContent.toLowerCase();
        const match = caption.includes(q);
        item.hidden = !match;
        if (match) visible++;
      });
      noResults.hidden = visible > 0;
    });
  </script>
</body>
</html>
